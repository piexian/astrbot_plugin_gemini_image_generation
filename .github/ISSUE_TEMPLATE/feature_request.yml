name: 功能建议
description: 提出新功能或改进建议
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: 功能描述
      description: 清晰描述你期望的功能
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 使用场景
      description: 为什么需要这个功能？解决什么问题？

  - type: textarea
    id: proposal
    attributes:
      label: 实现方案（可选）
      description: 如果有想法，描述你建议的实现方式

  - type: dropdown
    id: willing-to-pr
    attributes:
      label: 是否愿意提交 PR 实现
      options:
        - "是"
        - "否"
    validations:
      required: false
